<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'space': ['"Space Mono"', 'monospace'],
          },
          colors: {
            'light-bg': 'hsl(185, 41%, 84%)',
            'dark-cyan': 'hsl(183, 100%, 15%)',
            'neon-green': 'hsl(172, 67%, 45%)',
            'grayish-cyan': 'hsl(184, 14%, 56%)',
            'very-light-cyan': 'hsl(189, 47%, 97%)'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-light-bg font-space flex items-center justify-center min-h-screen p-4">

  <div class="card bg-white rounded-xl shadow-lg max-w-3xl w-full flex flex-col md:flex-row gap-6 p-6">
    
    <!-- Input Section -->
    <div class="input-section flex-1 flex flex-col gap-4 text-gray-600 font-bold">
      <label for="bill" class="text-gray-600">Bill</label>
      <input type="number" id="bill" placeholder="$" class="w-full p-3 rounded-md bg-very-light-cyan text-dark-cyan font-space text-lg outline-none">

      <label class="text-gray-600">Select Tip %</label>
      <div class="tip-grid grid grid-cols-3 gap-3">
        <button id="five" class="p-3 bg-dark-cyan text-white rounded-md font-bold text-lg hover:bg-gray-800">5%</button>
        <button id="ten" class="p-3 bg-dark-cyan text-white rounded-md font-bold text-lg hover:bg-gray-800">10%</button>
        <button id="fifteen" class="p-3 bg-dark-cyan text-white rounded-md font-bold text-lg hover:bg-gray-800">15%</button>
        <button id="twenty-five" class="p-3 bg-dark-cyan text-white rounded-md font-bold text-lg hover:bg-gray-800">25%</button>
        <button id="fifty" class="p-3 bg-dark-cyan text-white rounded-md font-bold text-lg hover:bg-gray-800">50%</button>
        <input type="number" id="custom" placeholder="Custom" class="p-3 rounded-md bg-very-light-cyan text-dark-cyan font-bold text-lg outline-none w-full">
      </div>

      <label for="people" class="text-gray-600">Number of People</label>
      <input type="number" id="people" placeholder="👤" class="w-full p-3 rounded-md bg-very-light-cyan text-dark-cyan font-bold text-lg outline-none">
    </div>

    <!-- Results Section -->
    <div class="results-section flex-1 bg-dark-cyan text-white rounded-xl p-6 flex flex-col justify-between">
      
      <div class="result-row flex justify-between items-center mb-6">
        <div class="label-group flex flex-col">
          <p class="heading text-white font-bold">Tip Amount</p>
          <span class="text-gray-300 text-sm">/ person</span>
        </div>
        <span id="tip-amount" class="text-neon-green text-4xl font-bold">$0.00</span>
      </div>

      <div class="result-row flex justify-between items-center mb-6">
        <div class="label-group flex flex-col">
          <p class="heading text-white font-bold">Total</p>
          <span class="text-gray-300 text-sm">/ person</span>
        </div>
        <span id="total-amount" class="text-neon-green text-4xl font-bold">$0.00</span>
      </div>

      <button id="reset" class="w-full p-3 bg-neon-green text-dark-cyan font-bold uppercase rounded-md hover:brightness-110 transition">RESET</button>

    </div>
    
  </div>

  <script src="index.js"></script>
</body>
</html>
